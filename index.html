<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Un mensaje para ti 💕</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff0f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #pantalla {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      cursor: pointer;
      padding: 48px 32px;
      border-radius: 24px;
      border: 1.5px solid #f4c0d1;
      background: #fff;
      box-shadow: 0 4px 32px rgba(212, 83, 126, 0.08);
      max-width: 340px;
      width: 90vw;
      min-height: 260px;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    #pantalla:hover { transform: scale(1.02); box-shadow: 0 8px 40px rgba(212,83,126,0.14); }
    #pantalla:active { transform: scale(0.98); }

    #hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: opacity 0.3s;
    }

    #hint .icono {
      font-size: 52px;
      animation: pulso 1.4s infinite;
      line-height: 1;
    }
    @keyframes pulso {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.18); }
    }

    #hint p {
      font-size: 15px;
      color: #b56080;
      text-align: center;
    }

    #mensaje {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: aparecer 0.6s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes aparecer {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    #mensaje .titulo {
      font-size: 38px;
      font-weight: 700;
      color: #c4406c;
      text-align: center;
      line-height: 1.2;
    }

    #mensaje .sub {
      font-size: 15px;
      color: #b56080;
      text-align: center;
    }

    #volver {
      margin-top: 6px;
      font-size: 13px;
      color: #c4406c;
      background: none;
      border: 1px solid #f4c0d1;
      border-radius: 20px;
      padding: 6px 18px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #volver:hover { background: #fff0f5; }

    .corazon {
      position: fixed;
      font-size: 24px;
      pointer-events: none;
      animation: flotar linear forwards;
      opacity: 0;
    }
    @keyframes flotar {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-220px) scale(0.4) rotate(20deg); }
    }
  </style>
</head>
<body>

<div id="pantalla" onclick="mostrar(event)">

  <div id="hint">
    <div class="icono">💌</div>
    <p>Toca aquí,<br>tengo algo para ti&nbsp;✨</p>
  </div>

  <div id="mensaje">
    <div class="titulo">Te amo,<br>Gaby 💖</div>
    <div class="sub">Siempre. Sin condiciones.</div>
    <button id="volver" onclick="reiniciar(event)">volver</button>
  </div>

</div>

<script>
  let activo = false;

  function mostrar(e) {
    if (activo) return;
    activo = true;

    const hint = document.getElementById('hint');
    hint.style.opacity = '0';
    setTimeout(() => {
      hint.style.display = 'none';
      const msg = document.getElementById('mensaje');
      msg.style.display = 'flex';
    }, 280);

    lanzarCorazones();
  }

  function lanzarCorazones() {
    const emojis = ['❤️','💕','💖','💗','💝','🌸','✨'];
    let n = 0;
    const iv = setInterval(() => {
      const el = document.createElement('span');
      el.className = 'corazon';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (5 + Math.random() * 90) + 'vw';
      el.style.top = (60 + Math.random() * 30) + 'vh';
      el.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
      if (++n >= 22) clearInterval(iv);
    }, 100);
  }

  function reiniciar(e) {
    e.stopPropagation();
    activo = false;
    document.getElementById('mensaje').style.display = 'none';
    const hint = document.getElementById('hint');
    hint.style.display = 'flex';
    hint.style.opacity = '1';
  }
</script>

</body>
</html>
