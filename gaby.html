<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0d0d0d"/>
<title>Para ti</title>
<meta property="og:title" content="Alguien dejó algo para ti ✨"/>
<meta property="og:description" content="Toca para descubrir."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#0d0d0d;
  color:#fff;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

/* ── fondo animado ── */
.bg{
  position:fixed;inset:0;z-index:0;
  overflow:hidden;
}
.bg-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:.25;
  animation:orbFloat 12s ease-in-out infinite alternate;
}
.bg-orb:nth-child(1){width:300px;height:300px;background:#d4956b;top:-50px;left:-50px;animation-delay:0s}
.bg-orb:nth-child(2){width:250px;height:250px;background:#c47a8a;bottom:-40px;right:-40px;animation-delay:-4s}
.bg-orb:nth-child(3){width:200px;height:200px;background:#8a7ac4;top:40%;left:50%;animation-delay:-8s}
@keyframes orbFloat{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-20px) scale(1.1)}
  66%{transform:translate(-20px,30px) scale(.9)}
  100%{transform:translate(15px,15px) scale(1.05)}
}

/* ── escenas ── */
.s{
  position:fixed;inset:0;z-index:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px;
  opacity:0;
  pointer-events:none;
  transition:opacity .9s ease;
}
.s.on{opacity:1;pointer-events:auto}

/* ── ESCENA 1: la llama ── */
.flame-wrap{
  position:relative;
  width:120px;height:120px;
  cursor:pointer;
}
.flame-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:1.5px solid rgba(212,149,107,.3);
  animation:ringPulse 2.5s ease-in-out infinite;
}
.flame-ring:nth-child(2){animation-delay:.8s;inset:-12px}
.flame-ring:nth-child(3){animation-delay:1.6s;inset:-24px}
@keyframes ringPulse{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.5;transform:scale(1.04)}}

.flame-core{
  position:absolute;
  top:50%;left:50%;
  width:36px;height:36px;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,#f0c898,#d4956b);
  border-radius:50%;
  box-shadow:0 0 40px 12px rgba(212,149,107,.35),0 0 80px 24px rgba(212,149,107,.15);
  animation:coreBreathe 2s ease-in-out infinite;
}
@keyframes coreBreathe{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 40px 12px rgba(212,149,107,.35),0 0 80px 24px rgba(212,149,107,.15)}50%{transform:translate(-50%,-50%) scale(1.15);box-shadow:0 0 50px 16px rgba(212,149,107,.45),0 0 100px 30px rgba(212,149,107,.2)}}

.s1-text{
  margin-top:48px;
  font-size:16px;
  font-weight:300;
  color:rgba(255,255,255,.45);
  letter-spacing:.5px;
  text-align:center;
  line-height:1.6;
}
.s1-hint{
  margin-top:20px;
  font-size:12px;
  color:rgba(255,255,255,.2);
  animation:hintFade 2.5s ease-in-out infinite;
}
@keyframes hintFade{0%,100%{opacity:.2}50%{opacity:.5}}

/* ── ESCENA 2: nombre ── */
.name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(58px,16vw,100px);
  font-weight:700;
  color:#f0c898;
  text-shadow:0 0 30px rgba(240,200,152,.3),0 0 60px rgba(240,200,152,.1);
  opacity:0;
  transform:scale(.5);
}
.name.in{animation:nameEnter 1.2s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes nameEnter{from{opacity:0;transform:scale(.5) rotate(-3deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}

.name-sub{
  margin-top:12px;
  font-size:14px;
  font-weight:300;
  color:rgba(255,255,255,.35);
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0;
}
.name-sub.in{animation:softUp .8s ease forwards}
@keyframes softUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── ESCENA 3: tarjetas glass ── */
.card-stage{
  position:relative;
  width:min(340px,85vw);
  height:220px;
}
.card{
  position:absolute;inset:0;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:32px;
  opacity:0;
  transform:translateY(40px) scale(.92);
}
.card.in{animation:cardIn .7s cubic-bezier(.34,1.56,.64,1) forwards}
.card.out{animation:cardOut .4s ease forwards}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cardOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-30px) scale(.95)}}

.card-text{
  font-size:clamp(22px,6vw,32px);
  font-weight:300;
  line-height:1.5;
  letter-spacing:.3px;
}

.card-count{
  margin-top:28px;
  font-size:12px;
  color:rgba(255,255,255,.2);
  letter-spacing:4px;
}

.card-bar-wrap{
  margin-top:16px;
  width:min(200px,50vw);
  height:2px;
  background:rgba(255,255,255,.08);
  border-radius:2px;
  overflow:hidden;
}
.card-bar{
  height:100%;
  background:rgba(240,200,152,.5);
  border-radius:2px;
  transition:width .5s ease;
}

.card-tap{
  margin-top:16px;
  font-size:11px;
  color:rgba(255,255,255,.18);
}

/* ── ESCENA 4: final ── */
.final{
  display:flex;flex-direction:column;
  align-items:center;gap:24px;
  text-align:center;
}
.final-line{
  font-size:clamp(20px,5.5vw,28px);
  font-weight:300;
  line-height:1.7;
  color:rgba(255,255,255,.75);
  max-width:300px;
  opacity:0;
}
.final-line.in{animation:softUp .9s ease forwards}

.final-sig{
  font-family:'Dancing Script',cursive;
  font-size:22px;
  color:#d4956b;
  opacity:0;
}
.final-sig.in{animation:softUp .8s ease .2s forwards}

.final-btn{
  margin-top:8px;
  font-size:12px;font-weight:400;
  color:rgba(255,255,255,.25);
  background:none;
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:8px 22px;
  cursor:pointer;
  opacity:0;
  transition:color .3s,border-color .3s;
  font-family:inherit;
}
.final-btn:hover{color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.2)}
.final-btn.in{animation:softUp .6s ease .5s forwards}

/* ── ripple al tocar ── */
.ripple{
  position:fixed;
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(240,200,152,.25);
  pointer-events:none;
  z-index:50;
  animation:rippleOut .6s ease-out forwards;
}
@keyframes rippleOut{from{transform:scale(1);opacity:.4}to{transform:scale(25);opacity:0}}

/* ── golden rain ── */
.grain{
  position:fixed;
  width:3px;
  border-radius:3px;
  pointer-events:none;
  z-index:10;
  opacity:0;
  animation:grainFall linear forwards;
}
@keyframes grainFall{
  0%{opacity:0;transform:translateY(0)}
  10%{opacity:.8}
  90%{opacity:.6}
  100%{opacity:0;transform:translateY(85vh)}
}

/* ── burst ── */
.dot{
  position:fixed;
  width:5px;height:5px;
  border-radius:50%;
  pointer-events:none;
  z-index:10;
  animation:dotBurst ease-out forwards;
}
@keyframes dotBurst{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(0)}
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<!-- ESCENA 1 -->
<div class="s on" id="s1">
  <div class="flame-wrap" id="flame">
    <div class="flame-ring"></div>
    <div class="flame-ring"></div>
    <div class="flame-ring"></div>
    <div class="flame-core"></div>
  </div>
  <p class="s1-text">Alguien dejó algo<br>aquí para ti</p>
  <p class="s1-hint">toca la luz</p>
</div>

<!-- ESCENA 2 -->
<div class="s" id="s2">
  <div class="name" id="gName">Gaby</div>
  <p class="name-sub" id="gSub">esto es para ti</p>
</div>

<!-- ESCENA 3 -->
<div class="s" id="s3">
  <div class="card-stage" id="cardStage"></div>
  <p class="card-count" id="cardCount"></p>
  <div class="card-bar-wrap"><div class="card-bar" id="cardBar"></div></div>
  <p class="card-tap" id="cardTap">toca para seguir</p>
</div>

<!-- ESCENA 4 -->
<div class="s" id="s4">
  <div class="final">
    <p class="final-line" id="fLine">Solo quería recordarte<br>que alguien está orgulloso<br>de quien eres.</p>
    <p class="final-sig" id="fSig">— para ti, Gaby</p>
    <button class="final-btn" id="fBtn">ver de nuevo</button>
  </div>
</div>

<script>
const phrases = [
  {text:'Tú puedes con todo',color:'#f0c898'},
  {text:'Siempre bonita, Gaby',color:'#e8b0b0'},
  {text:'Lo que te propones\nlo sacas adelante',color:'#b0c8e8'},
  {text:'Me gusta verte bien',color:'#c8e8b0'},
  {text:'Nunca dejes\nde ser como eres',color:'#e8c8f0'},
  {text:'Eres más fuerte\nde lo que crees',color:'#f0d8a8'},
];

let ci = -1, sc = 1, lock = false;

/* ── utilidades ── */
function go(n) {
  if (lock) return;
  lock = true;
  document.querySelectorAll('.s').forEach(s => s.classList.remove('on'));
  setTimeout(() => {
    document.getElementById('s' + n).classList.add('on');
    sc = n;
    lock = false;
  }, 500);
}

function ripple(e) {
  const r = document.createElement('div');
  r.className = 'ripple';
  const x = e.clientX || e.touches?.[0]?.clientX || innerWidth / 2;
  const y = e.clientY || e.touches?.[0]?.clientY || innerHeight / 2;
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  document.body.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function burst(x, y, n) {
  const colors = ['#f0c898', '#e8b0b0', '#d4956b', '#c47a8a', '#b0c8e8', '#fff'];
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    const a = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 70;
    d.style.left = x + 'px';
    d.style.top = y + 'px';
    d.style.background = colors[Math.floor(Math.random() * colors.length)];
    d.style.setProperty('--bx', Math.cos(a) * dist + 'px');
    d.style.setProperty('--by', Math.sin(a) * dist + 'px');
    d.style.animationDuration = (.5 + Math.random() * .4) + 's';
    document.body.appendChild(d);
    d.addEventListener('animationend', () => d.remove());
  }
}

function goldenRain() {
  const colors = ['#f0c898', '#d4956b', '#e8b0b0', '#c8e8b0', '#e8c8f0', '#fff'];
  for (let i = 0; i < 50; i++) {
    const g = document.createElement('div');
    g.className = 'grain';
    g.style.left = Math.random() * 100 + 'vw';
    g.style.top = -10 + 'px';
    g.style.height = (12 + Math.random() * 20) + 'px';
    g.style.background = colors[Math.floor(Math.random() * colors.length)];
    g.style.animationDuration = (1.2 + Math.random() * 1.8) + 's';
    g.style.animationDelay = (Math.random() * 1.5) + 's';
    document.body.appendChild(g);
    g.addEventListener('animationend', () => g.remove());
  }
}

/* ── escena 1 ── */
document.getElementById('flame').addEventListener('click', function (e) {
  if (sc !== 1 || lock) return;
  ripple(e);
  const rect = this.getBoundingClientRect();
  burst(rect.left + rect.width / 2, rect.top + rect.height / 2, 18);
  setTimeout(() => {
    go(2);
    setTimeout(() => {
      document.getElementById('gName').classList.add('in');
      const nr = document.getElementById('gName').getBoundingClientRect();
      burst(nr.left + nr.width / 2, nr.top + nr.height / 2, 12);
      setTimeout(() => document.getElementById('gSub').classList.add('in'), 700);
      setTimeout(() => { go(3); startCards(); }, 3000);
    }, 600);
  }, 800);
});

/* ── escena 3 ── */
function startCards() {
  ci = -1;
  document.getElementById('cardStage').innerHTML = '';
  document.getElementById('cardBar').style.width = '0%';
  nextCard();
}

function nextCard() {
  if (ci >= phrases.length - 1) {
    setTimeout(() => { go(4); showFinal(); }, 400);
    return;
  }

  const stage = document.getElementById('cardStage');
  const prev = stage.querySelector('.card.in');
  if (prev) {
    prev.classList.remove('in');
    prev.classList.add('out');
    prev.addEventListener('animationend', () => prev.remove(), { once: true });
  }

  ci++;
  const c = document.createElement('div');
  c.className = 'card';
  const t = document.createElement('div');
  t.className = 'card-text';
  t.style.color = phrases[ci].color;
  t.innerHTML = phrases[ci].text.replace(/\n/g, '<br>');
  c.appendChild(t);
  stage.appendChild(c);
  requestAnimationFrame(() => c.classList.add('in'));

  document.getElementById('cardCount').textContent =
    String(ci + 1).padStart(2, '0') + ' · ' + String(phrases.length).padStart(2, '0');
  document.getElementById('cardBar').style.width =
    ((ci + 1) / phrases.length * 100) + '%';
}

document.getElementById('s3').addEventListener('click', function (e) {
  if (sc !== 3 || lock) return;
  ripple(e);
  nextCard();
});

/* ── escena 4 ── */
function showFinal() {
  goldenRain();
  setTimeout(() => document.getElementById('fLine').classList.add('in'), 300);
  setTimeout(() => document.getElementById('fSig').classList.add('in'), 900);
  setTimeout(() => {
    document.getElementById('fBtn').classList.add('in');
    goldenRain();
  }, 1400);
}

/* ── replay ── */
document.getElementById('fBtn').addEventListener('click', function () {
  if (lock) return;
  ['gName', 'gSub'].forEach(id => document.getElementById(id).classList.remove('in'));
  ['fLine', 'fSig', 'fBtn'].forEach(id => document.getElementById(id).classList.remove('in'));
  document.getElementById('cardStage').innerHTML = '';
  ci = -1;
  go(1);
});

/* ── touch ripple global ── */
document.addEventListener('touchstart', function (e) {
  if (sc === 1 || sc === 4) return;
  ripple(e);
}, { passive: true });
</script>
</body>
</html>
